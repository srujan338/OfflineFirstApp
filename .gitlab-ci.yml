stages:
  - prepare
  - lint
  - typecheck
  - security
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  DATABASE_URL: "sqlite:///./data/ci_invoices.db"

default:
  image: python:3.12-slim
  before_script:
    - cd backend
    - apt-get update
    - apt-get install -y --no-install-recommends tesseract-ocr libgl1 libglib2.0-0
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest black flake8 ruff mypy bandit httpx httpx2
  cache:
    paths:
      - .cache/pip

prepare_job:
  stage: prepare
  script:
    - pip check
    - python -m compileall app scripts
    - python -c "import app.main; print(app.main.app.title)"

lint_job:
  stage: lint
  script:
    - ruff check --no-cache app scripts
    - black --check app scripts
    - flake8 app scripts

typecheck_job:
  stage: typecheck
  script:
    - mypy app --ignore-missing-imports --explicit-package-bases

security_job:
  stage: security
  script:
    - bandit -r app scripts -x app/tests

test_job:
  stage: test
  script:
    - python scripts/init_db.py --database data/ci_schema.db --check
    - python -m pytest app/tests
    - python scripts/seed_data.py --database data/ci_seed.db
    - python scripts/benchmark_cpu.py --image-dir data/uploads

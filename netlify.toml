[build]
  # Netlify auto-detected frontend/ as the base directory,
  # so all paths are relative to frontend/ — no cd needed.
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* requests to the backend
# ⚠️  Replace the URL below with your actual deployed backend
[[redirects]]
  from = "/api/*"
  to = "https://offlinefirstapp.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
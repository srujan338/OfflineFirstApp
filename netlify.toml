[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* requests to the backend
# Update the URL below to match your deployed backend (e.g. https://your-app.onrender.com)
# For local dev with Netlify CLI, use http://localhost:8000
[[redirects]]
  from = "/api/*"
  to = "https://offlinefirstapp.onrender.com/"
  status = 200
  force = true

# SPA fallback — serve index.html for non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200